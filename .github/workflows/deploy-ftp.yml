name: Deploy SharedChemistry to WebHostingBuzz

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Confirm local source folder
        run: |
          echo "Checking ph7_source folder..."
          ls -la ph7_source
          test -f ph7_source/index.php
          echo "ph7_source/index.php found."

      - name: Deploy ph7_source to live server
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_TARGET_DIR: ${{ secrets.FTP_TARGET_DIR }}
        run: |
          FTP_HOST_CLEAN="$(echo "$FTP_HOST" | tr -d '[:space:]')"
          FTP_PORT_CLEAN="$(echo "$FTP_PORT" | tr -d '[:space:]')"
          FTP_TARGET_DIR_CLEAN="$(echo "$FTP_TARGET_DIR" | tr -d '[:space:]')"

          echo "Deploying ph7_source/ to: [$FTP_TARGET_DIR_CLEAN]"

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "ftp://$FTP_HOST_CLEAN:$FTP_PORT_CLEAN" -e "
          set cmd:fail-exit yes
          set ftp:ssl-allow yes
          set ssl:verify-certificate no
          set ftp:passive-mode yes
          mirror -R --verbose --only-newer --parallel=2 ph7_source/ $FTP_TARGET_DIR_CLEAN
          cls -la
          bye
          "
