name: FTP Connection Test

on:
  push:
    branches:
      - master

jobs:
  ftp-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Check secret lengths
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_TARGET_DIR: ${{ secrets.FTP_TARGET_DIR }}
        run: |
          echo "FTP_HOST length: ${#FTP_HOST}"
          echo "FTP_USERNAME length: ${#FTP_USERNAME}"
          echo "FTP_PASSWORD length: ${#FTP_PASSWORD}"
          echo "FTP_PORT length: ${#FTP_PORT}"
          echo "FTP_TARGET_DIR length: ${#FTP_TARGET_DIR}"

          if [ -z "$FTP_HOST" ]; then echo "FTP_HOST is missing"; exit 1; fi
          if [ -z "$FTP_USERNAME" ]; then echo "FTP_USERNAME is missing"; exit 1; fi
          if [ -z "$FTP_PASSWORD" ]; then echo "FTP_PASSWORD is missing"; exit 1; fi
          if [ -z "$FTP_PORT" ]; then echo "FTP_PORT is missing"; exit 1; fi
          if [ -z "$FTP_TARGET_DIR" ]; then echo "FTP_TARGET_DIR is missing"; exit 1; fi

      - name: Test FTP connection
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          echo "Testing FTP connection..."

          FTP_HOST_CLEAN="$(echo "$FTP_HOST" | tr -d '[:space:]')"
          FTP_PORT_CLEAN="$(echo "$FTP_PORT" | tr -d '[:space:]')"

          echo "FTP host being used: [$FTP_HOST_CLEAN]"
          echo "FTP port being used: [$FTP_PORT_CLEAN]"

          lftp -d -u "$FTP_USERNAME","$FTP_PASSWORD" "ftp://$FTP_HOST_CLEAN:$FTP_PORT_CLEAN" -e "
          set cmd:fail-exit yes
          set ftp:ssl-allow yes
          set ssl:verify-certificate no
          set ftp:passive-mode yes
          pwd
          cls -la
          bye
          "
