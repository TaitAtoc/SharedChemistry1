name: FTP Safe Upload Test

on:
  push:
    branches:
      - master

jobs:
  ftp-upload-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Create test upload file
        run: |
          echo "GitHub FTP upload test successful - $(date -u)" > github-ftp-test.txt

      - name: Upload test file to live server
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_TARGET_DIR: ${{ secrets.FTP_TARGET_DIR }}
        run: |
          FTP_HOST_CLEAN="$(echo "$FTP_HOST" | tr -d '[:space:]')"
          FTP_PORT_CLEAN="$(echo "$FTP_PORT" | tr -d '[:space:]')"
          FTP_TARGET_DIR_CLEAN="$(echo "$FTP_TARGET_DIR" | tr -d '[:space:]')"

          echo "Uploading test file to: [$FTP_TARGET_DIR_CLEAN]"

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "ftp://$FTP_HOST_CLEAN:$FTP_PORT_CLEAN" -e "
          set cmd:fail-exit yes
          set ftp:ssl-allow yes
          set ssl:verify-certificate no
          set ftp:passive-mode yes
          cd $FTP_TARGET_DIR_CLEAN
          put github-ftp-test.txt
          cls -la github-ftp-test.txt
          bye
          "
